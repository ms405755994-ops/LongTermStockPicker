name: Cloud Stock Scan

on:
  workflow_dispatch:
    inputs:
      max_scan_count:
        description: "最多扫描股票数量"
        required: true
        default: "100"
      end_date:
        description: "结束日期 yyyyMMdd，留空则使用今天"
        required: false
        default: ""
      start_date:
        description: "开始日期 yyyyMMdd，留空则使用结束日期前10年"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run cloud scan
        env:
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          MAX_SCAN_COUNT: ${{ github.event.inputs.max_scan_count }}
          END_DATE: ${{ github.event.inputs.end_date }}
          START_DATE: ${{ github.event.inputs.start_date }}
        run: |
          python scripts/cloud_scan.py

      - name: Commit latest result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/results/latest.json
          git diff --cached --quiet && exit 0
          git commit -m "Update cloud scan results"
          git push
